server:
  port: ${SERVER_PORT:8088}
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:serviceops}
    username: ${DB_USER:serviceops}
    password: ${DB_PASSWORD:serviceops}
  flyway:
    default-schema: audit
    schemas: audit
  jpa:
    hibernate:
      ddl-auto: validate
management:
  endpoints:
    web:
      exposure:
        include: health
app:
  hmacSecret: ${AUDIT_HMAC_SECRET:serviceops-audit-secret}
