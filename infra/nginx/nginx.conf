worker_processes  1;

events { worker_connections  1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;
  client_max_body_size 10m;

  # Stable request id
  map $http_x_request_id $req_id {
    default $http_x_request_id;
    ""      $request_id;
  }

  upstream web_app       { server web:3000; }
  upstream auth_service  { server auth-service:8081; }
  upstream itsm_service  { server itsm-service:8082; }
  upstream audit_service { server audit-service:8088; }
  upstream sla_service   { server sla-service:8083; }
  upstream cmdb_service  { server cmdb-service:8084; }
  upstream knowledge_service { server knowledge-service:8085; }
  upstream integrations_service { server integrations-service:8086; }
  upstream workflow_service { server workflow-service:8087; }

  server {
    listen 8080;

    # Your scripts seem to call /health
    location = /health {
      add_header Content-Type text/plain;
      add_header X-Request-ID $req_id;
      return 200 "ok\n";
    }
    location = /healthz {
      add_header Content-Type text/plain;
      add_header X-Request-ID $req_id;
      return 200 "ok\n";
    }

    # IMPORTANT: /api routes must come before /
    location = /api/auth/.well-known/jwks.json {
      add_header X-Request-ID $req_id;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $req_id;
      proxy_pass http://auth_service/.well-known/jwks.json;
    }

    location /api/auth/ {
      add_header X-Request-ID $req_id;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $req_id;
      proxy_pass http://auth_service;
    }

    location /api/itsm/ {
      add_header X-Request-ID $req_id;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $req_id;
      proxy_pass http://itsm_service;
    }

    location /api/audit/ {
      add_header X-Request-ID $req_id;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $req_id;
      proxy_pass http://audit_service;
    }

    location /api/sla/ {
      add_header X-Request-ID $req_id;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $req_id;
      proxy_pass http://sla_service;
    }

    location /api/cmdb/ {
      add_header X-Request-ID $req_id;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $req_id;
      proxy_pass http://cmdb_service;
    }

    location /api/knowledge/ {
      add_header X-Request-ID $req_id;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $req_id;
      proxy_pass http://knowledge_service;
    }

    location /api/integrations/ {
      add_header X-Request-ID $req_id;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $req_id;
      proxy_pass http://integrations_service;
    }

    location /api/workflow/ {
      add_header X-Request-ID $req_id;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $req_id;
      proxy_pass http://workflow_service;
    }

    # Canonical browser entry is localhost:3000. Keep 8080 for API traffic and redirect UI navigations.
    location / {
      return 302 http://localhost:3000$request_uri;
    }
  }
}
