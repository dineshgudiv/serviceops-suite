name: CI

on:
  push:
  pull_request:

jobs:
  proof-serviceops:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Proof ServiceOps
        shell: pwsh
        run: ./scripts/proof_serviceops.ps1

      - name: Upload proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: proof-md
          path: PROOF.md
